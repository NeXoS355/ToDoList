<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoList</title>
    <style>
      /* Painted before any CSS/JS module loads — kills the white flash. */
      html, body { margin: 0; background: #0b0f14; }
      html[data-theme="light"], html[data-theme="light"] body { background: #f3f5f8; }
    </style>
    <script>
      /* Resolve theme before first paint: stored explicit choice, else
         ("system" or nothing stored) the OS preference. */
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
