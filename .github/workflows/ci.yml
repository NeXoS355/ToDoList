name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: app

      - name: Typecheck
        run: pnpm typecheck
        working-directory: app

      - name: Unit tests
        run: pnpm test
        working-directory: app

  rust:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './app/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: app

      # tauri::generate_context! embeds frontendDist (../dist), which is
      # gitignored — build it before compiling the Rust crate.
      - name: Build frontend
        run: pnpm build
        working-directory: app

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml
        working-directory: app
